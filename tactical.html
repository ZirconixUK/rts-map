<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTS Map Tactical</title>
    <meta
      name="description"
      content="Closer-range tactical map centered on the current player position placeholder."
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.4.0/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="tactical-page">
    <div
      id="tactical-map"
      class="tactical-map-fullscreen"
      aria-label="Tactical map centered on Lime Street Station"
    >
      <div class="tactical-map-fallback">
        <p>
          Loading the tactical map. If the live layer does not appear, check
          network access to the CDN tile and script sources.
        </p>
      </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@5.4.0/dist/maplibre-gl.js"></script>
    <script src="tactical.js"></script>
  </body>
</html>

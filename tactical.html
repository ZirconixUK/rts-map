<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTS Map Tactical</title>
    <meta
      name="description"
      content="Closer-range tactical map centered on the current player position placeholder."
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.4.0/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="tactical-page">
    <div class="tactical-map-shell" aria-label="Tactical map centered on Lime Street Station">
      <div
        id="tactical-map"
        class="tactical-map-fullscreen"
        aria-label="Interactive tactical map centered on Lime Street Station"
      >
        <div class="tactical-map-overlay" id="tactical-map-overlay">
          <p id="tactical-map-status">Loading tactical map...</p>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@5.4.0/dist/maplibre-gl.js"></script>
    <script src="tactical.js"></script>
  </body>
</html>

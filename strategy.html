<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTS Map Strategy</title>
    <meta
      name="description"
      content="Interactive strategy map for the RTS Map prototype."
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body class="strategy-page">
    <div class="strategy-map-shell" aria-label="Strategy map">
      <iframe
        id="strategy-map-fallback"
        class="strategy-map-fallback"
        title="Strategy map fallback"
        src="https://www.openstreetmap.org/export/embed.html?bbox=-2.987%2C53.4025%2C-2.967%2C53.4135&amp;layer=mapnik&amp;marker=53.407822%2C-2.977385"
      ></iframe>
      <div id="strategy-map" class="strategy-map-full" aria-label="Strategy map"></div>
    </div>

    <button class="map-fab" id="recenter-button" type="button" aria-label="Recenter map">
      Recenter
    </button>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="strategy.js"></script>
  </body>
</html>

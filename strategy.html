<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTS Map Strategy</title>
    <meta
      name="description"
      content="Interactive strategy map for the RTS Map prototype."
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #dbe6cf;
        font-family: "Trebuchet MS", "Avenir Next", sans-serif;
      }

      .strategy-map-shell {
        position: fixed;
        inset: 0;
      }

      .strategy-map-fallback,
      .strategy-map-full {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .strategy-map-full {
        opacity: 0;
      }

      .strategy-map-ready .strategy-map-full {
        opacity: 1;
      }

      .strategy-map-ready .strategy-map-fallback {
        opacity: 0;
        pointer-events: none;
      }

      .map-fab {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        z-index: 1000;
        border: 0;
        border-radius: 999px;
        padding: 0.9rem 1.1rem;
        background: rgba(18, 28, 22, 0.82);
        color: #fff9f0;
        font: inherit;
        font-weight: 700;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(10px);
        cursor: pointer;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body class="strategy-page">
    <div class="strategy-map-shell" aria-label="Strategy map">
      <iframe
        id="strategy-map-fallback"
        class="strategy-map-fallback"
        title="Strategy map fallback"
        src="https://www.openstreetmap.org/export/embed.html?bbox=-2.987%2C53.4025%2C-2.967%2C53.4135&amp;layer=mapnik&amp;marker=53.407822%2C-2.977385"
      ></iframe>
      <div id="strategy-map" class="strategy-map-full" aria-label="Strategy map"></div>
    </div>

    <button class="map-fab" id="recenter-button" type="button" aria-label="Recenter map">
      Recenter
    </button>

    <script src="strategy.js?v=20260328c"></script>
  </body>
</html>
